[package]
name        = "tku-tui"
description = "Ratatui TUI shell for tkucli: navigation, forms, data views"
version.workspace  = true
edition.workspace  = true
authors.workspace  = true
license.workspace  = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/tku-tui"
readme = "../README.md"
rust-version.workspace = true
keywords = ["cli", "tui", "ratatui", "framework", "rust"]
